name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bhkey.sh
          generate_release_notes: true

      - name: Print SHA256 for Homebrew formula
        run: |
          echo "=== Homebrew formula SHA256 ==="
          SHA256=$(curl -sL "https://github.com/baekho-lim/bhkey/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256 \"${SHA256}\""
          echo "url \"https://github.com/baekho-lim/bhkey/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz\""
